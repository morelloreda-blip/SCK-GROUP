<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCK-GROUP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="formulario">
        <h1>INICIO DE SESION</h1>
        <from method="post">
            <div class="imagen1">
                <img src="usuariob.png" width="130">
            </div>
            <div class="imagen2">
                <img src="usuarioL.png" width="30">
            </div>
            <div class="username">
                <label for= "usuario"></label>
                <input  type="text" id="usuario" name="USUARIO" placeholder="Ingrese su usuario"/>
            </div>
            <div class="imagen3">
                <img src="candado.png" width="30">
            </div>
            <div class="contraseña">
                <input type="password" id="contraseña" name="CONTRASEÑA" placeholder="Ingrese su contraseña">
                <label for = "contraseña"></label>
            </div> 
            <div class="iniciar">  
            <input type="submit" value="INICIAR">
            </div>
            <div class="contacto">
                si tienes dudas comunicate a <a href="#">soporte</a>
            </div> 
               
        </from>

    </div>
    
</body>
</html>
