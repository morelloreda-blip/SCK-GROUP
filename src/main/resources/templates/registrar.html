<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Cliente - SCK-GROUP</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/estilos.css}">
</head>
<body>

    <div class="contenedor">
        <h2>Registrar Nuevo Cliente</h2>
        <p>RF5 - Registro de clientes nuevos</p>

        <!-- Formulario enlazado al objeto "cliente" mediante th:object -->
        <!-- Cada campo usa th:field para asociarlo a un atributo de la clase Cliente -->
        <form th:action="@{/guardarCliente}" th:object="${cliente}" method="post">

            <label>Numero de identificacion:</label><br>
            <input type="text" th:field="*{numeroIdentificacion}" required><br><br>

            <label>Nombre completo:</label><br>
            <input type="text" th:field="*{nombreCompleto}" required><br><br>

            <label>Telefono:</label><br>
            <input type="text" th:field="*{telefono}"><br><br>

            <label>Ciudad:</label><br>
            <input type="text" th:field="*{ciudad}"><br><br>

            <label>Monto del credito:</label><br>
            <input type="number" step="0.01" th:field="*{montoCredito}" required><br><br>

            <label>Numero de dias para pagar:</label><br>
            <input type="number" th:field="*{numeroDias}" required><br><br>

            <label>Nombre de la ruta:</label><br>
            <input type="text" th:field="*{nombreRuta}"><br><br>

            <button type="submit" class="boton">Registrar</button>
        </form>

        <br>
        <a th:href="@{/}">Volver al menu</a>
    </div>

</body>
</html>
